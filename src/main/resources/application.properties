spring.application.name=zombieland-backend
server.port=8080
spring.config.import=optional:classpath:application-secrets.properties

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Proxy/Funnel support
server.forward-headers-strategy=framework

# PostgreSQL DataSource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/zombieland_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:zombieland}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:zombieland_password}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
