name: Deploy Test (Release)

on:
  push:
    branches:
      - release

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Sync Code to Test Directory
        run: |
          /usr/bin/mkdir -p /home/juan/ZOmbiland-Test/ZOmbiland-Backend
          /usr/bin/rsync -avz --exclude '.git' ./ /home/juan/ZOmbiland-Test/ZOmbiland-Backend/

      - name: Deploy with Docker Compose (Test)
        run: |
          /usr/bin/mkdir -p /home/juan/ZOmbiland-Test
          cd /home/juan/ZOmbiland-Test
          # Asegurar que tenemos los archivos de infraestructura actualizados
          /usr/bin/cp /home/juan/ZOmbiland-Test/ZOmbiland-Backend/docker-compose.yml ./docker-compose.test.yml
          /usr/bin/cp /home/juan/ZOmbiland-Test/ZOmbiland-Backend/nginx.conf ./nginx.test.conf
          # Limpiar posibles conflictos de nombres (Fuerza la recreación limpia)
          /usr/bin/docker rm -f zombiland-frontend zombieland-backend zombieland-nginx || true
          # Reiniciar específicamente el backend y el proxy
          /usr/bin/docker compose -f docker-compose.test.yml up -d --build backend nginx
