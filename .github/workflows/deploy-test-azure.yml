name: Build and deploy Docker app to Azure Web App - zombieland-api-test

on:
  push:
    branches:
      - despliegue-de-prueba
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/arsw-zombieland/zombieland-backend:test

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'zombieland-api-test'
          images: ghcr.io/arsw-zombieland/zombieland-backend:test
